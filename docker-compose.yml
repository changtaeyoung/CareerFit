services:
  db:
    image: postgres:16.3
    container_name: careerfit-db
    environment:
      POSTGRES_DB: careerfit
      POSTGRES_USER: careerfit
      POSTGRES_PASSWORD: careerfit!@#
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: